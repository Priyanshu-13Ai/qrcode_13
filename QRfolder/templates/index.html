<!DOCTYPE html>
<html>

<head>

<title>Advanced QR Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: 'class' }
</script>

<script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>

</head>

<body class="min-h-screen bg-gradient-to-r from-purple-600 via-blue-500 to-indigo-600 dark:bg-gray-900 flex items-center justify-center">

<div class="grid grid-cols-2 gap-10 backdrop-blur-xl bg-white/20 dark:bg-gray-800 p-10 rounded-2xl shadow-2xl w-[1000px]">

<div>

<h1 class="text-3xl font-bold text-white mb-6">
🚀 Advanced QR Generator
</h1>

<input id="data" placeholder="Enter text or URL"
class="w-full p-3 rounded-lg mb-4 outline-none">

<label class="text-white">QR Color</label>
<input type="color" id="color" value="#000000" class="mb-4">

<br>

<label class="text-white">Gradient End</label>
<input type="color" id="color2" value="#ff00ff" class="mb-4">

<br>

<label class="text-white">Background</label>
<input type="color" id="bg" value="#ffffff" class="mb-4">

<br>

<label class="text-white">QR Style</label>

<select id="style" class="w-full p-2 rounded mb-4">

<option value="square">Square</option>
<option value="dots">Dots</option>
<option value="rounded">Rounded</option>
<option value="extra-rounded">Extra Rounded</option>

</select>

<label class="text-white">QR Template</label>

<select id="template" class="w-full p-2 rounded mb-4">

<option value="custom">Custom</option>
<option value="wifi">WiFi</option>
<option value="email">Email</option>
<option value="whatsapp">WhatsApp</option>

</select>

<label class="text-white">Upload Logo</label>

<input type="file" id="logo" class="w-full mb-4 text-white">

<button onclick="toggleDark()"
class="bg-black text-white px-4 py-2 rounded">
Toggle Dark Mode
</button>

</div>

<div class="text-center">

<h2 class="text-white text-xl mb-4">
Live QR Preview
</h2>

<div id="qr-preview"
class="bg-white p-5 rounded-xl shadow-lg inline-block"></div>

<br><br>

<button onclick="downloadPNG()"
class="bg-green-500 text-white px-5 py-2 rounded mr-2">
Download PNG
</button>

<button onclick="downloadSVG()"
class="bg-purple-500 text-white px-5 py-2 rounded">
Download SVG
</button>

</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
